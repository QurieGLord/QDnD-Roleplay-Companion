name: QDnD Release (Android & Web)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.14.0)'
        required: true
        type: string
      release_name:
        description: 'Release Name (e.g., The Grand Update)'
        required: true
        type: string
      release_notes:
        description: 'Release Notes (Markdown)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Normalize version
        id: version
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          # Strip leading 'v' or 'V' if present
          CLEAN_VERSION="${RAW_VERSION#v}"
          CLEAN_VERSION="${CLEAN_VERSION#V}"
          echo "tag=v${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_name=qdnd-v${CLEAN_VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web (PWA)
        run: flutter build web --base-href "/QDnD-Roleplay-Companion/" --release --dart-define=FLUTTER_WEB_RENDERER=canvaskit

      - name: Build Android APK
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          commit_message: "Deploy Web PWA: ${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ github.event.inputs.release_name }}
          body: ${{ github.event.inputs.release_notes }}
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false
